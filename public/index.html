<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FODMAP Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #d8d3c8;
      --text: #1a1a18;
      --muted: #7a7670;
      --low: #2d6a4f;
      --low-bg: #d8f3dc;
      --med: #b07d00;
      --med-bg: #fff3cd;
      --high: #c0392b;
      --high-bg: #fde8e6;
      --accent: #2c5282;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    header {
      background: var(--text);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lang-toggle {
      display: flex;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    .lang-toggle button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      transition: all 0.15s;
    }

    .lang-toggle button.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--text); }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      z-index: 100;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }

    .suggestions.open { display: block; }

    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--bg);
      transition: background 0.1s;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--bg); }

    .suggestion-name { font-weight: 500; }
    .suggestion-cat { font-size: 12px; color: var(--muted); }

    /* Lists panel */
    .lists-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .list-tab {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .list-tab.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .list-tab .del-list {
      font-size: 11px;
      opacity: 0.6;
      margin-left: 2px;
    }

    .list-tab .del-list:hover { opacity: 1; }

    .btn {
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--bg); }

    .btn-primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn-primary:hover { opacity: 0.85; background: var(--text); }

    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .table-toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sort-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .sort-group select {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      background: var(--bg);
      cursor: pointer;
    }

    .export-group { display: flex; gap: 6px; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--bg); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafaf7; }

    td {
      padding: 10px 16px;
      vertical-align: middle;
    }

    .fodmap-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .fodmap-low { background: var(--low-bg); color: var(--low); }
    .fodmap-medium { background: var(--med-bg); color: var(--med); }
    .fodmap-high { background: var(--high-bg); color: var(--high); }

    .detail-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 2px;
    }

    .dot-0 { background: var(--low-bg); border: 1px solid var(--low); }
    .dot-1 { background: var(--med-bg); border: 1px solid var(--med); }
    .dot-2 { background: var(--high-bg); border: 1px solid var(--high); }

    .details-cell {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .detail-chip {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .detail-chip.level-0 { background: var(--low-bg); color: var(--low); }
    .detail-chip.level-1 { background: var(--med-bg); color: var(--med); }
    .detail-chip.level-2 { background: var(--high-bg); color: var(--high); }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: var(--high); }

    .empty-state {
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .empty-state p { margin-top: 8px; }

    .group-header td {
      background: var(--bg);
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 6px 16px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 8px;
      padding: 24px;
      width: 340px;
      max-width: 90vw;
    }

    .modal h3 { margin-bottom: 16px; font-size: 15px; }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }

    .modal input:focus { border-color: var(--text); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    @media (max-width: 600px) {
      td:nth-child(4), th:nth-child(4) { display: none; }
      td:nth-child(5), th:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>⊕ FODMAP Checker</h1>
  <div class="header-right">
    <div class="lang-toggle">
      <button id="btn-de" class="active" onclick="setLang('de')">DE</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <!-- Search -->
  <div class="search-wrap">
    <input
      id="search-input"
      class="search-input"
      type="text"
      autocomplete="off"
      placeholder="Lebensmittel suchen…"
    />
    <div id="suggestions" class="suggestions"></div>
  </div>

  <!-- List tabs -->
  <div class="lists-bar" id="lists-bar"></div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-toolbar">
      <div class="sort-group">
        <label id="lbl-sort">Sortieren:</label>
        <select id="sort-select" onchange="renderTable()">
          <option value="fodmap" id="opt-fodmap">FODMAP-Index</option>
          <option value="category" id="opt-category">Kategorie</option>
          <option value="name" id="opt-name">Name</option>
        </select>
      </div>
      <div class="export-group">
        <button class="btn btn-sm" onclick="exportCSV()" id="btn-csv">↓ CSV</button>
        <button class="btn btn-sm btn-primary" onclick="exportJSON()" id="btn-json">↓ JSON</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th id="th-name">Name</th>
          <th id="th-cat">Kategorie</th>
          <th id="th-fodmap">FODMAP</th>
          <th id="th-details">Details</th>
          <th id="th-qty">Menge</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="empty-state" class="empty-state">
      <div style="font-size:28px">🥦</div>
      <p id="empty-text">Noch keine Lebensmittel hinzugefügt.</p>
    </div>
  </div>
</main>

<!-- New list modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Neue Liste erstellen</h3>
    <input id="modal-input" type="text" maxlength="40" />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()" id="modal-cancel">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmModal()" id="modal-confirm">Erstellen</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let lang = localStorage.getItem('fodmap-lang') || 'de';
let allData = [];
let activeList = localStorage.getItem('fodmap-active-list') || 'default';
let lists = {};   // { listName: [item, ...] }
let modalCallback = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Load data
  const file = lang === 'de' ? 'data/fodmap_de.json' : 'data/fodmap.json';
  const res = await fetch(file);
  allData = await res.json();

  // Load lists from localStorage
  const saved = localStorage.getItem('fodmap-lists');
  if (saved) {
    lists = JSON.parse(saved);
  }
  if (!lists[activeList]) {
    lists[activeList] = [];
    if (activeList === 'default') lists[activeList] = [];
  }
  if (!lists['default']) lists['default'] = [];

  applyLang();
  renderListTabs();
  renderTable();
  initSearch();
}

// ─── Language ─────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  localStorage.setItem('fodmap-lang', l);
  location.reload();
}

function applyLang() {
  const de = lang === 'de';
  document.getElementById('btn-de').classList.toggle('active', de);
  document.getElementById('btn-en').classList.toggle('active', !de);
  document.getElementById('search-input').placeholder = de ? 'Lebensmittel suchen…' : 'Search food…';
  document.getElementById('lbl-sort').textContent = de ? 'Sortieren:' : 'Sort:';
  document.getElementById('opt-fodmap').textContent = de ? 'FODMAP-Index' : 'FODMAP Index';
  document.getElementById('opt-category').textContent = de ? 'Kategorie' : 'Category';
  document.getElementById('opt-name').textContent = de ? 'Name' : 'Name';
  document.getElementById('btn-csv').textContent = '↓ CSV';
  document.getElementById('btn-json').textContent = '↓ JSON';
  document.getElementById('th-name').textContent = de ? 'Name' : 'Name';
  document.getElementById('th-cat').textContent = de ? 'Kategorie' : 'Category';
  document.getElementById('th-fodmap').textContent = 'FODMAP';
  document.getElementById('th-details').textContent = de ? 'Details' : 'Details';
  document.getElementById('th-qty').textContent = de ? 'Menge' : 'Qty';
  document.getElementById('empty-text').textContent = de
    ? 'Noch keine Lebensmittel hinzugefügt. Suche oben.'
    : 'No foods added yet. Search above.';
  document.getElementById('modal-title').textContent = de ? 'Neue Liste erstellen' : 'Create new list';
  document.getElementById('modal-cancel').textContent = de ? 'Abbrechen' : 'Cancel';
  document.getElementById('modal-confirm').textContent = de ? 'Erstellen' : 'Create';
}

// ─── Lists ────────────────────────────────────────────────────────────────────
function saveLists() {
  localStorage.setItem('fodmap-lists', JSON.stringify(lists));
  localStorage.setItem('fodmap-active-list', activeList);
}

function renderListTabs() {
  const bar = document.getElementById('lists-bar');
  bar.innerHTML = '';

  const names = Object.keys(lists);
  names.forEach(name => {
    const tab = document.createElement('button');
    tab.className = 'list-tab' + (name === activeList ? ' active' : '');
    const displayName = name === 'default' ? (lang === 'de' ? 'Meine Liste' : 'My List') : name;
    tab.innerHTML = `<span>${displayName}</span>` +
      (name !== 'default' ? `<span class="del-list" onclick="deleteList('${name}', event)">✕</span>` : '');
    tab.onclick = () => switchList(name);
    bar.appendChild(tab);
  });

  // New list button
  const newBtn = document.createElement('button');
  newBtn.className = 'btn btn-sm';
  newBtn.textContent = lang === 'de' ? '+ Neue Liste' : '+ New List';
  newBtn.onclick = () => openModal('new-list');
  bar.appendChild(newBtn);
}

function switchList(name) {
  activeList = name;
  saveLists();
  renderListTabs();
  renderTable();
}

function deleteList(name, e) {
  e.stopPropagation();
  if (!confirm(lang === 'de' ? `Liste "${name}" löschen?` : `Delete list "${name}"?`)) return;
  delete lists[name];
  if (activeList === name) activeList = 'default';
  saveLists();
  renderListTabs();
  renderTable();
}

function openModal(type) {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-input').focus();
  modalCallback = type;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCallback = null;
}

function confirmModal() {
  const val = document.getElementById('modal-input').value.trim();
  if (!val) return;
  if (modalCallback === 'new-list') {
    lists[val] = [];
    activeList = val;
    saveLists();
    renderListTabs();
    renderTable();
  }
  closeModal();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});

// ─── Search ───────────────────────────────────────────────────────────────────
function initSearch() {
  const input = document.getElementById('search-input');
  const box = document.getElementById('suggestions');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 1) { box.classList.remove('open'); return; }

    const nameKey = lang === 'de' ? 'name_de' : 'name';
    const catKey = lang === 'de' ? 'category_de' : 'category';

    const matches = allData.filter(d =>
      (d[nameKey] || d.name).toLowerCase().includes(q)
    ).slice(0, 8);

    if (!matches.length) { box.classList.remove('open'); return; }

    box.innerHTML = matches.map(d => `
      <div class="suggestion-item" onclick="addItem('${d.id}')">
        <div>
          <div class="suggestion-name">${d[nameKey] || d.name}</div>
          <div class="suggestion-cat">${d[catKey] || d.category}</div>
        </div>
        <span class="fodmap-badge fodmap-${d.fodmap}">${d.fodmap}</span>
      </div>
    `).join('');

    box.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!document.querySelector('.search-wrap').contains(e.target)) {
      box.classList.remove('open');
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { box.classList.remove('open'); input.value = ''; }
  });
}

function addItem(id) {
  const item = allData.find(d => d.id === id);
  if (!item) return;
  const current = lists[activeList] || [];
  if (current.find(x => x.id === id)) {
    document.getElementById('search-input').value = '';
    document.getElementById('suggestions').classList.remove('open');
    return;
  }
  lists[activeList] = [...current, item];
  saveLists();
  renderTable();
  document.getElementById('search-input').value = '';
  document.getElementById('suggestions').classList.remove('open');
}

function removeItem(id) {
  lists[activeList] = (lists[activeList] || []).filter(x => x.id !== id);
  saveLists();
  renderTable();
}

// ─── Table ────────────────────────────────────────────────────────────────────
const LEVEL_LABEL = {
  de: { 0: 'niedrig', 1: 'mittel', 2: 'hoch' },
  en: { 0: 'low', 1: 'medium', 2: 'high' }
};

const DETAIL_KEYS = ['oligos', 'fructose', 'polyols', 'lactose'];
const DETAIL_LABELS = {
  de: { oligos: 'Oligos', fructose: 'Fructose', polyols: 'Polyole', lactose: 'Laktose' },
  en: { oligos: 'Oligos', fructose: 'Fructose', polyols: 'Polyols', lactose: 'Lactose' }
};

function renderTable() {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const sortBy = document.getElementById('sort-select').value;
  const nameKey = lang === 'de' ? 'name_de' : 'name';
  const catKey = lang === 'de' ? 'category_de' : 'category';

  let items = [...(lists[activeList] || [])];

  if (!items.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Sort
  const ORDER = { low: 0, medium: 1, high: 2 };
  if (sortBy === 'fodmap') {
    items.sort((a, b) => (ORDER[b.fodmap] ?? 0) - (ORDER[a.fodmap] ?? 0) ||
      (a[nameKey] || a.name).localeCompare(b[nameKey] || b.name));
  } else if (sortBy === 'category') {
    items.sort((a, b) =>
      (a[catKey] || a.category).localeCompare(b[catKey] || b.category) ||
      (a[nameKey] || a.name).localeCompare(b[nameKey] || b.name));
  } else {
    items.sort((a, b) => (a[nameKey] || a.name).localeCompare(b[nameKey] || b.name));
  }

  let rows = '';
  let lastGroup = null;

  items.forEach(item => {
    let groupKey = '';
    if (sortBy === 'fodmap') groupKey = item.fodmap;
    else if (sortBy === 'category') groupKey = item[catKey] || item.category;

    if (groupKey && groupKey !== lastGroup) {
      lastGroup = groupKey;
      let label = groupKey;
      if (sortBy === 'fodmap') {
        const lvl = { low: lang === 'de' ? '🟢 Niedrig' : '🟢 Low', medium: lang === 'de' ? '🟡 Mittel' : '🟡 Medium', high: lang === 'de' ? '🔴 Hoch' : '🔴 High' };
        label = lvl[groupKey] || groupKey;
      }
      rows += `<tr class="group-header"><td colspan="6">${label}</td></tr>`;
    }

    // Details chips — only show non-zero
    const chips = DETAIL_KEYS
      .filter(k => (item[k] ?? item.details?.[k]) > 0)
      .map(k => {
        const lvl = item[k] ?? item.details?.[k] ?? 0;
        return `<span class="detail-chip level-${lvl}">${DETAIL_LABELS[lang][k]}</span>`;
      }).join('');

    const name = item[nameKey] || item.name;
    const cat = item[catKey] || item.category;
    const qty = item.qty || '—';

    rows += `
      <tr>
        <td><strong>${name}</strong></td>
        <td style="color:var(--muted); font-size:13px">${cat}</td>
        <td><span class="fodmap-badge fodmap-${item.fodmap}">${item.fodmap}</span></td>
        <td><div class="details-cell">${chips || '<span style="color:var(--muted);font-size:12px">—</span>'}</div></td>
        <td style="font-size:12px; color:var(--muted)">${qty}</td>
        <td><button class="remove-btn" onclick="removeItem('${item.id}')" title="${lang === 'de' ? 'Entfernen' : 'Remove'}">×</button></td>
      </tr>`;
  });

  tbody.innerHTML = rows;
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportCSV() {
  const nameKey = lang === 'de' ? 'name_de' : 'name';
  const catKey = lang === 'de' ? 'category_de' : 'category';
  const items = lists[activeList] || [];
  const header = lang === 'de'
    ? 'Name,Kategorie,FODMAP,Oligos,Fructose,Polyole,Laktose,Menge'
    : 'Name,Category,FODMAP,Oligos,Fructose,Polyols,Lactose,Qty';
  const rows = items.map(i => [
    `"${(i[nameKey] || i.name).replace(/"/g, '""')}"`,
    `"${(i[catKey] || i.category).replace(/"/g, '""')}"`,
    i.fodmap,
    i.oligos ?? i.details?.oligos ?? 0,
    i.fructose ?? i.details?.fructose ?? 0,
    i.polyols ?? i.details?.polyols ?? 0,
    i.lactose ?? i.details?.lactose ?? 0,
    `"${(i.qty || '').replace(/"/g, '""')}"`
  ].join(','));
  download('fodmap-liste.csv', [header, ...rows].join('\n'), 'text/csv');
}

function exportJSON() {
  const items = lists[activeList] || [];
  download('fodmap-liste.json', JSON.stringify(items, null, 2), 'application/json');
}

function download(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = name;
  a.click();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
